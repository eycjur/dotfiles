onboarding = false

[terminal]
default_shell = "zsh"

[keys]
prefix = "ctrl+g"
detach = "prefix+d"
new_tab = "prefix+t"

split_vertical = "prefix+\\"
# split-window: prefix+minus(default)

# [[keys.command]]
# key = "prefix+ctrl+g"
# type = "pane"
# command = "lazygit"
# description = "open lazygit"

[[keys.command]]
key = "prefix+ctrl+y"
type = "pane"
command = "yazi"
description = "open yazi"

[[keys.command]]
key = "prefix+ctrl+h"
type = "pane"
command = "hunk"
description = "open hunk"

[theme]
name = "terminal"

[experimental]
# macOS + IME 利用時、prefix 中だけ ASCII 入力源に切り替える
switch_ascii_input_source_in_prefix = true

[ui]
agent_panel_sort = "spaces"
prompt_new_tab_name = false

[ui.sidebar.agents]
# 1行目: エージェント種別と状態
# 2行目: Claude Codeなどが設定したターミナルタイトル
# 3行目: workspaceとtab
rows = [
  ["state_icon", "agent", "state_text"],
  ["tab", "terminal_title_stripped"]
]

[ui.toast]
delivery = "herdr"
