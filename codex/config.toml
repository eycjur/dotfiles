model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
hide_agent_reasoning = false
developer_instructions = "日本語で簡潔かつ丁寧に回答する。"

sandbox_mode = "workspace-write"
approval_policy = "on-request"
default_permissions = "workspace-sandbox"

project_doc_fallback_filenames = ["CLAUDE.md"]
web_search = "cached"
commit_attribution = ""

notify = ["bash", "-c", "printf '\\a' > $TTY || true"]

[analytics]
enabled = false

[feedback]
enabled = false

[permissions.workspace-sandbox]
description = "Workspace read/write under sandbox; deny sensitive paths."
extends = ":workspace"

[permissions.workspace-sandbox.filesystem]
glob_scan_max_depth = 5
"~/.ssh" = "deny"
"~/.aws" = "deny"
"~/.config/gcloud" = "deny"
"~/.kube/config" = "deny"

[permissions.workspace-sandbox.filesystem.":workspace_roots"]
"." = "write"
"**/*.env" = "deny"
"credentials/**" = "deny"
"**/*credentials*" = "deny"
"secrets/**" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"

[permissions.workspace-sandbox.network]
enabled = true

[shell_environment_policy]
inherit = "core"
exclude = [
  "GITHUB_TOKEN",
  "OPENAI_API_KEY",
  "GEMINI_API_KEY",
  "ANTHROPIC_API_KEY",
  "CLAUDE_CODE_OAUTH_TOKEN",
]

[tui]
alternate_screen = "always"
notification_method = "bel"
notification_condition = "always"

[projects."/Users/kmuto/dotfiles"]
trust_level = "trusted"

[projects."/Users/kmuto/programing/git/airas"]
trust_level = "trusted"

[features]
hooks = true

[hooks.state]

[hooks.state."/Users/kmuto/.codex/hooks.json:session_start:0:0"]
trusted_hash = "sha256:0523ae1e29b703d1b64ae20f664f4198d7254024fd226c29f962b7e394876430"
